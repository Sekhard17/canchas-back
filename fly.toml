# fly.toml app configuration file generated for canchas-matices on 2024-10-13T05:03:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'canchas-matices'
primary_region = 'scl'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
